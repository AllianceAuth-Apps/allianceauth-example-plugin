stages:
    - checks
    - test
    - deploy

pre-commit:
    stage: checks
    image: python:3.12-bookworm
    variables:
        PRE_COMMIT_HOME: ${CI_PROJECT_DIR}/.cache/pre-commit
    cache:
        paths:
            - ${PRE_COMMIT_HOME}
    script:
        - pip install pre-commit
        - pre-commit run --all-files

.tox_setup:
    before_script:
        - apt-get update
        - apt-get install redis-server -y
        - redis-server --daemonize yes
        - python -V
        - pip install tox

pylint:
    stage: checks
    extends: .tox_setup
    image: python:3.12-bookworm
    allow_failure: true
    script:
        - tox -e pylint

test:
  extends: .tox_setup
  image: python:3.$PYTHON_VERSION-bookworm
  parallel:
    matrix:
    - PYTHON_VERSION: [10, 11, 12]
      DJANGO_VERSION: [52]
  script:
    - tox -e py3$PYTHON_VERSION-django$DJANGO_VERSION
    - bash <(curl -s https://codecov.io/bash)

deploy-pypi:
    stage: deploy
    image: python:3.12-bookworm

    before_script:
        - pip install build twine

    script:
        - python -m build
        - twine upload dist/*

    only:
        - tags

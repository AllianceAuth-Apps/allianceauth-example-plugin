; Main configuration for running tests with the CI pipeline
; Currently configured to run tests with both AA4 (=Django 4.2) and AA5 (=Django 5.2)

[flake8]
exclude = .git, *migrations*, .tox, dist, htmlcov
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py310, py311, py312}-django{42, 52}, pylint

[testenv]
setenv =
    !django52: DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local
    django52: DJANGO_SETTINGS_MODULE = testauth.settings_aa5.local

deps=
    !django52: allianceauth<5
    django52: allianceauth>=5.0.0a3
    coverage

commands_pre=
    pip list

commands=
    coverage run runtests.py example -v 2
    coverage xml
    coverage report -m

[testenv:pylint]
deps=
    pylint
    pylint-django

commands=
    pylint --load-plugins pylint_django example
